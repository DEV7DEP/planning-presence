<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Présence 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {font-family: Calibri, Arial, sans-serif; background:#f0f0f0; margin:0; padding:10px;}
        .header {text-align:center; background:#fff; padding:15px; border-bottom:3px solid #1e40af;}
        .title {font-size:34px; font-weight:bold; color:#1e40af; margin:0;}
        .nav {display:flex; justify-content:space-between; align-items:center; background:#d0d7e0; padding:12px 20px; margin:10px 0; border-radius:6px;}
        button {padding:10px 18px; font-size:15px; cursor:pointer; border:none; border-radius:4px;}
        .action-panel {position:fixed; right:25px; top:160px; background:white; border:2px solid #333; padding:12px; width:240px; border-radius:8px; box-shadow:0 5px 20px rgba(0,0,0,0.3);}
        .action-panel button {width:100%; margin:6px 0; font-weight:bold;}
        table {border-collapse:collapse; background:white; width:100%; max-width:1600px; margin:15px auto; box-shadow:0 4px 15px rgba(0,0,0,0.2);}
        th, td {border:1px solid #666; padding:9px; text-align:center; min-width:78px;}
        th {background:#4a90e2; color:white; font-weight:bold;}
        .name-col {text-align:left; font-weight:bold; background:#c1e1c1; width:290px; padding-left:15px;}
        .cell {cursor:pointer; font-weight:bold; height:50px;}
        .P {background:#c1e1c1; color:black;}
        .A {background:#c62828; color:white;}
        .halfA {background:#ab47bc; color:white;}
        .RP {background:#95a5a6; color:white;}
        .info {text-align:center; color:#1e40af; font-weight:bold; margin:8px;}
    </style>
</head>
<body>

<div class="header">
    <h1 class="title">Planning Présence 2026</h1>
</div>

<div class="nav">
    <button id="btnPrev">◄ Semaine précédente</button>
    <span id="weekLabel" style="font-size:22px; font-weight:bold;">Semaine 17 → 18</span>
    <button id="btnNext">Semaine suivante ►</button>
</div>

<div style="position:relative;">
    <table id="planningTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="action-panel">
        <button onclick="resetChanges()">Réinitialiser récent</button>
        <button onclick="saveToExcel()" style="background:#000;color:white;">💾 Sauvegarder</button>
        <button onclick="exportPlanning()" style="background:#e67e22;color:white;">📤 Exporter</button>
        <button onclick="addAgent()" style="background:#4caf50;color:white;">+ Ajouter Agent</button>
        <button onclick="deleteAgent()" style="background:#f44336;color:white;">− Supprimer Agent</button>
    </div>
</div>

<div class="info" id="status">Chargement de OP.xlsx depuis GitHub...</div>

<script>
// ==================== CONFIGURATION GITHub ====================
const EXCEL_URL = "https://raw.githubusercontent.com/DEV7DEP/planning-presence/main/OP.xlsx";

let agents = [];
let currentMonday = new Date(2026, 3, 20);
let localChanges = {};
const FERIES_2026 = ["2026-04-06","2026-05-01","2026-05-08","2026-05-14","2026-05-25"];

// ==================== CHARGEMENT AUTOMATIQUE OP.XLSX ====================
async function loadOPfromGitHub() {
    document.getElementById('status').textContent = "Chargement de OP.xlsx depuis GitHub...";
    
    try {
        const response = await fetch(EXCEL_URL);
        if (!response.ok) throw new Error("Fichier non trouvé");
        
        const arrayBuffer = await response.arrayBuffer();
        const workbook = XLSX.read(new Uint8Array(arrayBuffer), {type: 'array'});
        
        // Lecture des agents (colonne A, à partir de la ligne 5)
        const ws = workbook.Sheets[workbook.SheetNames[0]];
        agents = [];
        for (let r = 4; r < 100; r++) {
            const cell = ws[XLSX.utils.encode_cell({r: r, c: 0})];
            if (!cell || !cell.v) continue;
            const name = String(cell.v).trim();
            if (name && name.length > 2) agents.push(name);
        }

        document.getElementById('status').innerHTML = `✅ ${agents.length} agents chargés depuis GitHub`;
        buildTable();
        
    } catch (error) {
        document.getElementById('status').innerHTML = `❌ Erreur chargement : ${error.message}<br>Utilisez le bouton ci-dessous pour charger manuellement`;
        console.error(error);
    }
}

// ==================== CONSTRUCTION TABLEAU ====================
function buildTable() {
    // ... (même code que précédemment, je te le donne complet ci-dessous pour éviter les erreurs)
    const dates = [];
    for (let i = 0; i < 14; i++) {
        const d = new Date(currentMonday);
        d.setDate(d.getDate() + i);
        dates.push(d);
    }

    const thead = document.getElementById('tableHead');
    const tbody = document.getElementById('tableBody');
    thead.innerHTML = ''; tbody.innerHTML = '';

    const weekRow = document.createElement('tr');
    weekRow.innerHTML = `<th class="name-col"></th><th colspan="7" style="background:#d0d7e0">Semaine ${getWeek(dates[0])}</th><th colspan="7" style="background:#d0d7e0">Semaine ${getWeek(dates[7])}</th>`;
    thead.appendChild(weekRow);

    const dayRow = document.createElement('tr');
    dayRow.innerHTML = `<th class="name-col">Nom</th>`;
    dates.forEach(d => {
        const th = document.createElement('th');
        th.textContent = d.toLocaleDateString('fr-FR', {weekday:'short', day:'2-digit', month:'2-digit'});
        if (isWeekendOrHoliday(d)) th.style.background = '#95a5a6';
        dayRow.appendChild(th);
    });
    thead.appendChild(dayRow);

    agents.forEach(agent => {
        const row = document.createElement('tr');
        row.innerHTML = `<td class="name-col">${agent}</td>`;

        dates.forEach((date, idx) => {
            const td = document.createElement('td');
            td.className = 'cell';
            const dateStr = date.toISOString().split('T')[0];

            if (isWeekendOrHoliday(date)) {
                td.textContent = 'RP';
                td.classList.add('RP');
            } else {
                td.textContent = 'P';
                td.classList.add('P');

                if (localChanges[agent] && localChanges[agent][dateStr]) {
                    const v = localChanges[agent][dateStr];
                    td.textContent = v;
                    td.className = v === 'A' ? 'cell A' : 'cell halfA';
                }

                td.addEventListener('click', (e) => handleCellClick(e, td, agent, dateStr, idx));
                td.addEventListener('contextmenu', (e) => { e.preventDefault(); setHalfAbsent(td, agent, dateStr); });
            }
            row.appendChild(td);
        });
        tbody.appendChild(row);
    });

    document.getElementById('weekLabel').textContent = `Semaine ${getWeek(dates[0])} → ${getWeek(dates[7])}`;
}

// ==================== LES FONCTIONS CLIC (Ctrl / Shift) ====================
function handleCellClick(e, cell, agent, dateStr, colIndex) {
    if (e.ctrlKey) markColumn(colIndex);
    else if (e.shiftKey) markWeek(agent, colIndex);
    else toggleCell(cell, agent, dateStr);
}

function toggleCell(cell, agent, dateStr) {
    if (cell.textContent === 'P') { cell.textContent = 'A'; cell.className = 'cell A'; }
    else if (cell.textContent === 'A') { cell.textContent = 'P'; cell.className = 'cell P'; }
    updateLocal(agent, dateStr, cell.textContent);
}

function setHalfAbsent(cell, agent, dateStr) {
    cell.textContent = '½ A';
    cell.className = 'cell halfA';
    updateLocal(agent, dateStr, '½ A');
}

function updateLocal(agent, dateStr, value) {
    if (!localChanges[agent]) localChanges[agent] = {};
    if (value === 'P') delete localChanges[agent][dateStr];
    else localChanges[agent][dateStr] = value;
}

function markColumn(colIndex) {
    document.querySelectorAll('#tableBody tr').forEach(row => {
        const cell = row.cells[colIndex + 1];
        if (cell && !cell.classList.contains('RP')) {
            cell.textContent = 'A'; cell.className = 'cell A';
        }
    });
}

function markWeek(agent, colIndex) {
    const start = colIndex < 7 ? 0 : 7;
    const rows = document.querySelectorAll('#tableBody tr');
    const idx = agents.indexOf(agent);
    if (idx === -1) return;
    for (let i = 0; i < 5; i++) {
        const cell = rows[idx].cells[start + i + 1];
        if (cell && !cell.classList.contains('RP')) {
            cell.textContent = 'A'; cell.className = 'cell A';
        }
    }
}

function isWeekendOrHoliday(date) {
    const d = date.getDay();
    const ds = date.toISOString().split('T')[0];
    return d === 0 || d === 6 || FERIES_2026.includes(ds);
}

function getWeek(date) {
    let d = new Date(date); d.setHours(0,0,0,0);
    d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
    const week1 = new Date(d.getFullYear(),0,4);
    return Math.round(((d - week1)/86400000 -3 + (week1.getDay()+6)%7)/7) + 1;
}

// Boutons
function resetChanges() { if(confirm("Réinitialiser tout ?")) { localChanges = {}; buildTable(); } }
function saveToExcel() { alert("💾 Sauvegarde simulée"); }
function exportPlanning() { alert("📤 Export simulé"); }
function addAgent() { let n=prompt("Nom du nouvel agent ?"); if(n){agents.push(n); buildTable();} }
function deleteAgent() { let n=prompt("Nom à supprimer ?"); if(n){agents=agents.filter(a=>a!==n); buildTable();} }

// Navigation
document.getElementById('btnPrev').onclick = () => { currentMonday.setDate(currentMonday.getDate()-7); buildTable(); };
document.getElementById('btnNext').onclick = () => { currentMonday.setDate(currentMonday.getDate()+7); buildTable(); };

// Lancement automatique
loadOPfromGitHub();
</script>
</body>
</html>
