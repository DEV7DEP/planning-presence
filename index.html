<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Planning</title>
    <style>body{font-family:Arial;margin:20px;} #status{padding:15px;border:2px solid #333;border-radius:8px;}</style>
</head>
<body>
<h1>🔍 Debug Google Sheets</h1>
<div id="status">Chargement...</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwEnZ6r7ROnKN_LxuoSCNHQ_9t_XDD0bypFTc_w_qqRGCf8ZK_QL3UHFArE2Bicgyur/exec";

async function test() {
    const status = document.getElementById('status');
    try {
        const r = await fetch(SCRIPT_URL);
        const data = await r.json();
        
        console.log("Réponse brute :", data);
        
        if (data.success === false) {
            status.innerHTML = `<span style="color:red">❌ ${data.error}</span>`;
        } else {
            let html = `<b>✅ Connexion OK</b><br>`;
            html += `Lignes totales : ${data.totalRows}<br>`;
            html += `Premier agent : ${data.firstFewRows[0] ? data.firstFewRows[0].nom + " " + data.firstFewRows[0].prenom : "Aucun"}<br><br>`;
            html += "<b>Premiers agents :</b><ul>";
            data.firstFewRows.forEach(row => {
                html += `<li>${row.nom} ${row.prenom}</li>`;
            });
            html += "</ul>";
            status.innerHTML = html;
        }
    } catch(err) {
        status.innerHTML = `<span style="color:red">Erreur Fetch : ${err.message}</span>`;
    }
}

window.onload = test;
</script>
</body>
</html>
