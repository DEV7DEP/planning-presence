<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Présence 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Calibri, Arial, sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            background: white;
            padding: 20px 0;
            border-bottom: 4px solid #1e40af;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .title {
            font-size: 28px;
            font-weight: bold;
            color: #1e40af;
            margin: 0;
        }
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #e9ecef;
            padding: 12px 25px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .nav button {
            padding: 10px 20px;
            font-size: 15px;
            border: none;
            border-radius: 6px;
            background: #1e40af;
            color: white;
            cursor: pointer;
        }
        .main-content {
            display: flex;
            gap: 25px;
        }
        table {
            border-collapse: collapse;
            background: white;
            flex: 1;
            box-shadow: 0 6px 16px rgba(0,0,0,0.12);
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 10px 8px;
            text-align: center;
            font-size: 14.5px;
        }
        th {
            background: #1e40af;
            color: white;
            font-weight: 600;
        }
        .name-col {
            text-align: left;
            font-weight: bold;
            background: #d4f4d4;
            width: 260px;
            padding-left: 18px;
            position: sticky;
            left: 0;
            z-index: 2;
        }
        .cell {
            cursor: pointer;
            font-weight: bold;
            height: 52px;
            vertical-align: middle;
        }
        .P { background: #d4f4d4; color: #1e3a1e; }
        .A { background: #f8d7da; color: #721c24; }
        .halfA { background: #e2c1f0; color: #5e2b7a; }
        .RP { background: #e9ecef; color: #6c757d; }

        .action-panel {
            position: fixed;
            right: 30px;
            top: 180px;
            background: white;
            border: 2px solid #1e40af;
            padding: 15px;
            width: 240px;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .action-panel button {
            width: 100%;
            margin: 8px 0;
            padding: 13px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }
    </style>
</head>
<body>
<div class="header">
    <h1 class="title" id="mainTitle">Planning Présence - Avril → Mai 2026</h1>
</div>

<div class="nav">
    <button id="btnPrev">◄ Semaine précédente</button>
    <span id="weekLabel" style="font-size:22px; font-weight:bold;">Semaine 17 → 18</span>
    <button id="btnNext">Semaine suivante ►</button>
</div>

<div class="main-content">
    <table id="planningTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="action-panel">
        <button onclick="resetChanges()" style="background:#17a2b8; color:white;">🔄 Réinitialiser</button>
        <button onclick="saveToExcel()" style="background:#000000; color:white;">💾 Sauvegarder Excel</button>
        <button onclick="exportPlanning()" style="background:#e67e22; color:white;">📤 Exporter</button>
        <button onclick="addAgent()" style="background:#28a745; color:white;">+ Ajouter Agent</button>
        <button onclick="deleteAgent()" style="background:#dc3545; color:white;">− Supprimer Agent</button>
    </div>
</div>

</html>
