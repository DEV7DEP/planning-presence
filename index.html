// ==================== CHARGEMENT ====================
async function loadPlanning() {
    const status = document.getElementById('status');
    status.textContent = "Chargement depuis Supabase...";

    try {
        // Pour l'instant on charge depuis le Google Sheet public
        const XLSX_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRmNxgEeK7YsXD5FeYywbJ4QTP5IHgIOUM3pzSduy9W9I70zxru_SrvBLWtmqe3YKOWljrVRQisCA2p/pub?output=xlsx";
        const response = await fetch(XLSX_URL);
        const arrayBuffer = await response.arrayBuffer();
        const workbook = XLSX.read(arrayBuffer, { type: 'array' });
        const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });

        agents = [];
        for (let i = 3; i < data.length; i++) {
            const row = data[i];
            if (row[1] && row[1].toString().trim() !== "") {
                const nom = (row[1] || "").toString().trim();
                const prenom = (row[2] || "").toString().trim();
                agents.push(`${nom} ${prenom}`.trim());
            }
        }
        status.textContent = `✅ ${agents.length} agents chargés`;
        buildTable();
    } catch (e) {
        status.textContent = "❌ Erreur de chargement";
        console.error(e);
    }
}
